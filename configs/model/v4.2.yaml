
# Changes from v4.1 (with rationale from post-mortem):
#
#   1. weight_mlm:  5.0 → 1.0  (was 85% of gradient, drowning JEPA)
#   2. weight_jepa: 1.0 → 5.0  (JEPA is now the primary objective)
#   3. peak_lr:     1e-3 → 3e-4 (encoder updated too fast for EMA target)
#   4. warmup:      3 → 5 epochs (JEPA diverged during warmup in v4.1)
#   5. VICReg on raw embeddings (removed L2-norm that saturated var penalty)
#   6. weight_vicreg_var: 25 → 10 (less aggressive with raw embeddings)
#   7. weight_uniformity: 5.0 → 1.0 (supporting role, not dominant)
#   8. eval_every: 5 → 1 (catch collapse within first epoch)
#   9. save_every: 10 → 5 (more checkpoints for recovery)

encoder:
  vocab_size: 4096
  embed_dim: 576
  num_layers: 12
  num_heads: 9
  ff_dim: 2304
  ff_activation: swiglu
  dropout: 0.1
  max_seq_len: 512
  pos_encoding: rotary
  norm_type: rmsnorm
  qk_norm: true
  attention_dropout: 0.0
  embed_dropout: 0.1
  bias: false

loss:
  target_mode: stop_grad
  jepa_loss_type: smooth_l1
  weight_mlm: 1.0                # v4.1: 5.0 → v4.2: 1.0
  weight_jepa: 5.0               # v4.1: 1.0 → v4.2: 5.0
  weight_vicreg_var: 10.0        # v4.1: 25.0 → v4.2: 10.0
  weight_vicreg_cov: 1.0
  weight_uniformity: 1.0         # v4.1: 5.0 → v4.2: 1.0
  vicreg_gamma: 1.0
  use_gradnorm: false
  gradnorm_alpha: 0.5
  gradnorm_lr: 0.025
  mlm_mask_ratio: 0.15
  mlm_mask_strategy: span
  mlm_span_length: 5
  fragment:
    enabled: true
    context_size: 4
    predictor_depth: 2
    predictor_dim: 192
    predictor_heads: 6
    loss_weight: 1.0

training:
  optimizer: adamw
  peak_lr: 3.0e-4               # v4.1: 1e-3 → v4.2: 3e-4
  min_lr: 1.0e-6
  warmup_epochs: 5              # v4.1: 3 → v4.2: 5
  weight_decay_start: 0.04
  weight_decay_end: 0.4
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  grad_clip: 1.0
  lr_schedule: cosine
  epochs: 60
  batch_size: 128
  num_workers: 4
  mixed_precision: true
  precision: bf16
  data_path: data/processed/pretrain_2M.csv
  tokenizer_path: data/tokenizer/bpe_4096.json
  checkpoint_dir: outputs/checkpoints/v4.2
  save_every: 5                  # v4.1: 10 → v4.2: 5
  eval_every: 1                  # v4.1: 5 → v4.2: 1
  log_every: 50
  use_wandb: true
  wandb_project: bdna-jepa
  wandb_entity: null
  seed: 42
