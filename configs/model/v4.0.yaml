# B-JEPA v4.0 — 48M parameter foundation model
# BPE tokenizer, RoPE, SwiGLU, RMSNorm, QK-Norm, Stop-Grad

encoder:
  vocab_size: 4096
  embed_dim: 576
  num_layers: 12
  num_heads: 9
  ff_dim: 2304
  ff_activation: swiglu
  dropout: 0.1
  max_seq_len: 1024
  pos_encoding: rotary
  norm_type: rmsnorm
  qk_norm: true
  bias: false

predictor:
  depth: 4
  dim: 192
  num_heads: 6
  ff_dim: 768
  ff_activation: swiglu
  norm_type: rmsnorm
  bias: false
