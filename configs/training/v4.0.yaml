# B-JEPA v4.0 training recipe
# Target hardware: single A100 80GB
# Stop-gradient target (no EMA) — per ablation analysis

encoder:
  vocab_size: 4096
  embed_dim: 576
  num_layers: 12
  num_heads: 9
  ff_dim: 2304
  ff_activation: swiglu
  max_seq_len: 1024
  pos_encoding: rotary
  norm_type: rmsnorm
  qk_norm: true
  bias: false

predictor:
  depth: 4
  dim: 192
  num_heads: 6
  ff_dim: 768
  ff_activation: swiglu
  norm_type: rmsnorm
  bias: false

loss:
  target_mode: stop_grad
  jepa_loss_type: smooth_l1
  weight_mlm: 1.0
  weight_jepa: 1.0
  weight_vicreg_var: 25.0
  weight_vicreg_cov: 1.0
  vicreg_gamma: 1.0
  use_gradnorm: true
  gradnorm_alpha: 1.5
  gradnorm_lr: 0.025
  mlm_mask_ratio: 0.15
  mlm_mask_strategy: span
  mlm_span_length: 5
  fragment:
    enabled: true
    context_size: 4
    predictor_depth: 2
    predictor_dim: 192
    predictor_heads: 6
    loss_weight: 1.0

training:
  optimizer: adamw
  peak_lr: 1.0e-3
  min_lr: 1.0e-6
  warmup_epochs: 20
  weight_decay_start: 0.04
  weight_decay_end: 0.4
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  grad_clip: 1.0
  lr_schedule: cosine
  epochs: 300
  batch_size: 256
  num_workers: 4
  mixed_precision: true
  precision: bf16
  data_path: data/processed/pretrain_sequences_expanded.csv
  checkpoint_dir: outputs/checkpoints/v4.0
  save_every: 10
  eval_every: 10
  log_every: 50
  use_wandb: true
  wandb_project: bdna-jepa
  seed: 42
